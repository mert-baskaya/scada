services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: scada-kafka
    ports:
      - "29192:29192"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29192
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29192
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_MIN_INSYNC_REPLICAS: "1"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  postgres:
    image: postgres:16
    container_name: scada-postgres
    environment:
      POSTGRES_DB: scadadb
      POSTGRES_USER: scadauser
      POSTGRES_PASSWORD: scadapass
    ports:
      - "5475:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scadauser -d scadadb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  scada-simulator:
    build:
      context: ./scada-simulator
      dockerfile: Dockerfile
    container_name: scada-simulator
    environment:
      TOPIC_MODE: ${TOPIC_MODE:-single}
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  flink-jobmanager:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    container_name: scada-flink-jobmanager
    ports:
      - "8095:8081"
    command: standalone-job --job-classname demo.flink.ScadaStreamingJob
    restart: always
    environment:
      PIPELINE_MODE: ${PIPELINE_MODE:-cep}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 8
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
    depends_on:
      kafka:
        condition: service_healthy

  flink-taskmanager:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    container_name: scada-flink-taskmanager
    command: taskmanager
    restart: always
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 4g
        parallelism.default: 8
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
    depends_on:
      - flink-jobmanager

  flink-taskmanager-2:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    container_name: scada-flink-taskmanager-2
    command: taskmanager
    restart: always
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 4g
        parallelism.default: 8
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
    depends_on:
      - flink-jobmanager

  load-generator:
    build:
      context: ./load-generator
      dockerfile: Dockerfile
    container_name: scada-load-generator
    profiles: [loadtest]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TARGET_EPS: "${TARGET_EPS:-1000000}"
      NUM_COMPONENTS: "10000"
      THREADS: "6"
      DURATION_SECONDS: "0"
      PARTITIONS: "16"
      TOPIC_MODE: ${TOPIC_MODE:-single}
    depends_on:
      kafka:
        condition: service_healthy

  spring-api:
    build:
      context: ./spring-api
      dockerfile: Dockerfile
    container_name: scada-spring-api
    ports:
      - "8096:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/scadadb
      SPRING_DATASOURCE_USERNAME: scadauser
      SPRING_DATASOURCE_PASSWORD: scadapass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  flink-checkpoints:
